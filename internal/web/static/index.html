<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SAK Media Server</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #ffffff; --fg: #1a1a1a; --muted: #6b7280; --border: #e2e2e2;
    --card: #f7f7f8; --accent: #2563eb; --accent-fg: #ffffff;
    --danger: #dc2626; --ok: #16a34a; --warn: #d97706;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #15161a; --fg: #e8e8ea; --muted: #9a9aa2; --border: #2c2d33; --card: #1d1e23; }
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--fg); }
  a { color: var(--accent); }
  header { display: flex; align-items: center; gap: 1rem; padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  header h1 { font-size: 1.1rem; margin: 0; margin-right: 0.5rem; }
  .tabs { display: flex; gap: 0.25rem; flex-wrap: wrap; }
  .tabs button { background: none; border: 1px solid transparent; color: var(--muted); padding: 0.4rem 0.75rem; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
  .tabs button.active { background: var(--accent); color: var(--accent-fg); }
  .tabs button:not(.active):hover { border-color: var(--border); color: var(--fg); }
  main { padding: 1rem; max-width: 1100px; margin: 0 auto; }
  .banner { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
  .card h2 { margin-top: 0; font-size: 1rem; }
  .card h3 { font-size: 0.9rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.03em; margin: 1.25rem 0 0.5rem; }
  table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  th, td { text-align: left; padding: 0.4rem 0.5rem; border-bottom: 1px solid var(--border); vertical-align: top; }
  th { color: var(--muted); font-weight: 600; font-size: 0.8rem; }
  input[type=text], input[type=password], select { background: var(--bg); color: var(--fg); border: 1px solid var(--border); border-radius: 6px; padding: 0.35rem 0.5rem; font-size: 0.9rem; width: 100%; }
  button { background: var(--card); color: var(--fg); border: 1px solid var(--border); border-radius: 6px; padding: 0.35rem 0.7rem; cursor: pointer; font-size: 0.85rem; }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
  button.danger { color: var(--danger); border-color: var(--danger); }
  button:disabled { opacity: 0.5; cursor: default; }
  button + button { margin-left: 0.35rem; }
  .row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
  .muted { color: var(--muted); font-size: 0.85rem; }
  .pill { display: inline-block; padding: 0.1rem 0.5rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
  .pill.pending { background: #fef3c7; color: #92400e; }
  .pill.unmatched { background: #fee2e2; color: #991b1b; }
  .pill.applied { background: #dcfce7; color: #166534; }
  .pill.dismissed { background: #e5e7eb; color: #374151; }
  .pill.queued, .pill.downloading { background: #fef3c7; color: #92400e; }
  .pill.completed, .pill.imported { background: #dcfce7; color: #166534; }
  .pill.failed { background: #fee2e2; color: #991b1b; }
  .poster-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.75rem; }
  .poster-card { cursor: pointer; border-radius: 8px; overflow: hidden; background: var(--card); border: 1px solid var(--border); transition: border-color 0.15s; }
  .poster-card:hover { border-color: var(--accent); }
  .poster-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
  .poster-placeholder { width: 100%; aspect-ratio: 2/3; background: var(--border); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 0.75rem; text-align: center; padding: 0.5rem; }
  .poster-title { padding: 0.4rem 0.5rem; font-size: 0.8rem; }
  .chip { display: inline-flex; align-items: center; gap: 0.3rem; background: var(--bg); border: 1px solid var(--border); border-radius: 999px; padding: 0.1rem 0.5rem; font-size: 0.8rem; margin: 0.1rem; }
  .chip button { border: none; background: none; padding: 0; margin: 0; line-height: 1; color: var(--muted); font-size: 0.85rem; }
  .error { color: var(--danger); font-size: 0.85rem; }
  .empty { color: var(--muted); font-style: italic; padding: 1rem 0; }
  fieldset { border: 1px solid var(--border); border-radius: 8px; margin: 0 0 1rem; }
  legend { color: var(--muted); font-size: 0.85rem; padding: 0 0.4rem; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; align-items: end; }
  form label { display: block; margin-bottom: 0.75rem; font-size: 0.9rem; }
  form label input { margin-top: 0.25rem; }
  code { background: var(--bg); padding: 0.1rem 0.3rem; border-radius: 4px; }
</style>
</head>
<body>
<header>
  <h1>SAK Media Server</h1>
  <div class="tabs" id="mode-tabs"></div>
  <div class="tabs" id="view-tabs" style="margin-left:auto"></div>
  <div id="logout-slot"></div>
</header>
<main>
  <div id="view"></div>
</main>
<script>
"use strict";

const MODES = ["movies", "series", "adult"];
const MODE_LABELS = { movies: "Movies", series: "Series", adult: "Adult" };
// Which workflows apply to which mode — matches the backend's own wiring
// (Dedup groups duplicates by TMDB id for Movies, by (show, season,
// episode) for Series, by foreignID for Adult — see internal/dedup's
// package doc; Tag is live for all three; Search/Discover is Movies/Series
// only — Prowlarr/qBittorrent/NZBGet/TMDB replace Radarr/Sonarr's own
// acquisition loop, not Whisparr's).
const MODE_WORKFLOWS = {
  movies: ["search", "rename", "purge", "dedup", "tag", "settings"],
  series: ["search", "rename", "purge", "dedup", "tag", "settings"],
  adult:  ["rename", "purge", "dedup", "tag", "settings"],
};
const VIEW_LABELS = { search: "Search", rename: "Rename", purge: "Purge", dedup: "Dedup", tag: "Tag", settings: "Settings" };

const state = {
  mode: MODES[0],
  view: "search",
};

async function api(path, opts) {
  const res = await fetch(path, Object.assign({ headers: { "Content-Type": "application/json" } }, opts));
  if (res.status === 401 && !path.startsWith("/api/auth/")) {
    // The session expired or was never there — the safest recovery is to
    // re-run boot() from scratch, which re-checks /api/auth/status and
    // shows the login screen instead of a confusing inline error.
    boot();
    throw new Error("session expired");
  }
  if (res.status === 204) return null;
  const isJSON = (res.headers.get("Content-Type") || "").includes("application/json");
  const body = isJSON ? await res.json() : await res.text();
  if (!res.ok) {
    const msg = typeof body === "string" ? body : (body && body.error) || JSON.stringify(body);
    throw new Error(msg || ("HTTP " + res.status));
  }
  return body;
}

function el(tag, attrs, children) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (v === null || v === undefined || v === false) continue;
    if (k === "text") node.textContent = v;
    else if (k === "html") node.innerHTML = v;
    else if (k === "disabled") node.disabled = true;
    else if (k.startsWith("on")) node.addEventListener(k.slice(2), v);
    else node.setAttribute(k, v);
  }
  for (const c of children || []) node.appendChild(c);
  return node;
}

function fmtErr(err) {
  return el("div", { class: "error", text: "Error: " + err.message });
}

// ---- Nav ----

function renderNav() {
  const modeTabs = document.getElementById("mode-tabs");
  modeTabs.innerHTML = "";
  for (const m of MODES) {
    modeTabs.appendChild(el("button", {
      class: m === state.mode ? "active" : "",
      text: MODE_LABELS[m],
      onclick: () => { state.mode = m; const wf = MODE_WORKFLOWS[m]; if (!wf.includes(state.view)) state.view = wf[0]; render(); },
    }));
  }
  const viewTabs = document.getElementById("view-tabs");
  viewTabs.innerHTML = "";
  for (const v of MODE_WORKFLOWS[state.mode]) {
    viewTabs.appendChild(el("button", {
      class: v === state.view ? "active" : "",
      text: VIEW_LABELS[v],
      onclick: () => { state.view = v; render(); },
    }));
  }
  const logoutSlot = document.getElementById("logout-slot");
  logoutSlot.innerHTML = "";
  logoutSlot.appendChild(el("button", { text: "Log out", onclick: async () => { await api("/api/auth/logout", { method: "POST" }); await boot(); } }));
}

// ---- Connection controls (shared by Settings' table and the Setup Wizard) ----

// SERVICES_WITH_USERNAME authenticate with username+password rather than a
// single API key — qBittorrent's WebUI login and NZBGet's HTTP Basic auth.
// Everything else (every *arr app, every AI provider, TPDB/StashDB/FansDB/
// Brave/TMDB/Prowlarr) uses a single API key, so this list stays short.
const SERVICES_WITH_USERNAME = ["qbittorrent", "nzbget"];

// buildConnectionControls returns the live input/button elements for one
// service's connection — Test, Save, and a status readout — without
// assuming a particular layout, so both the Settings table (table cells)
// and the Wizard (a plain row) can arrange them differently. needsUsername
// is exposed so callers can decide whether to lay out a username field at
// all (most services don't need one).
function buildConnectionControls(service, existingConn, onSaved) {
  const needsUsername = SERVICES_WITH_USERNAME.includes(service);
  const usernameInput = el("input", { type: "text", value: existingConn ? (existingConn.username || "") : "", placeholder: "username" });
  const urlInput = el("input", { type: "text", value: existingConn ? existingConn.url : "", placeholder: "https://..." });
  const keyPlaceholder = existingConn && existingConn.hasApiKey ? "unchanged (••••" + existingConn.keySuffix + ")" : (needsUsername ? "password" : "api key (if needed)");
  const keyInput = el("input", { type: "password", placeholder: keyPlaceholder });
  const status = el("span", { class: "muted" });

  const requestBody = () => {
    const body = { url: urlInput.value, apiKey: keyInput.value };
    if (needsUsername) body.username = usernameInput.value;
    return body;
  };

  const testBtn = el("button", { text: "Test", onclick: async () => {
    status.textContent = "testing…"; status.className = "muted";
    try {
      const result = await api("/api/connections/test", { method: "POST", body: JSON.stringify(Object.assign({ service }, requestBody())) });
      status.textContent = result.ok ? "✓ ok" : ("✗ " + result.error);
      status.className = result.ok ? "muted" : "error";
    } catch (e) { status.textContent = "✗ " + e.message; status.className = "error"; }
  } });
  const saveBtn = el("button", { class: "primary", text: "Save", onclick: async () => {
    try {
      await api("/api/connections/" + service, { method: "PUT", body: JSON.stringify(requestBody()) });
      status.textContent = "✓ saved"; status.className = "muted";
      if (onSaved) await onSaved();
    } catch (e) { status.textContent = "✗ " + e.message; status.className = "error"; }
  } });
  const deleteBtn = el("button", { class: "danger", text: "Delete", disabled: !existingConn, onclick: async () => {
    if (!confirm("Remove the " + service + " connection?")) return;
    try {
      await api("/api/connections/" + service, { method: "DELETE" });
      if (onSaved) await onSaved();
    } catch (e) { status.textContent = "✗ " + e.message; status.className = "error"; }
  } });

  return { urlInput, usernameInput, keyInput, testBtn, saveBtn, deleteBtn, status, needsUsername };
}

// ---- Setup Wizard ----
// Walks through Movies' and Series' library root folders (both required to
// do anything at all — neither proxies a *arr app anymore), Whisparr and an
// AI provider (both optional — Adult and AI-assisted features are opt-in),
// then hands off to the normal app. Shown automatically until dismissed
// (see boot()); reachable afterward from Settings' "Re-run setup wizard"
// link.

async function renderWizard(container) {
  container.innerHTML = "";
  container.appendChild(el("h2", { text: "Set up SAK" }));
  container.appendChild(el("p", { class: "muted", text: "Movies and Series each need a library root folder to do anything at all — Whisparr (Adult) and an AI provider are optional." }));

  let status, connections;
  try {
    [status, connections] = await Promise.all([api("/api/setup/status"), api("/api/connections")]);
  } catch (e) { container.appendChild(fmtErr(e)); return; }
  const byService = {};
  for (const c of connections) byService[c.service] = c;
  const modeStatusByMode = {};
  for (const ms of status.modes) modeStatusByMode[ms.mode] = ms;

  let step = 1;
  container.appendChild(await buildLibraryWizardStep("movies", step++, modeStatusByMode.movies && modeStatusByMode.movies.arrConfigured, container));
  container.appendChild(await buildLibraryWizardStep("series", step++, modeStatusByMode.series && modeStatusByMode.series.arrConfigured, container));
  {
    const configured = modeStatusByMode.adult && modeStatusByMode.adult.arrConfigured;
    container.appendChild(buildWizardStep(step++, "Adult — connect whisparr", true, configured, "whisparr", byService.whisparr, container));
  }
  container.appendChild(await buildWizardAIStep(step++, byService, container));

  // Movies and Series can't do anything at all without a library root
  // folder configured, so "Continue to SAK" stays disabled until both are
  // actually set — otherwise dismissing the wizard just lands on the same
  // bare, useless Scan button the wizard exists to prevent, one step later.
  const moviesConfigured = modeStatusByMode.movies && modeStatusByMode.movies.arrConfigured;
  const seriesConfigured = modeStatusByMode.series && modeStatusByMode.series.arrConfigured;
  const canContinue = moviesConfigured && seriesConfigured;

  const footer = el("div", { class: "row", style: "margin-top:1rem" }, [
    el("button", { class: "primary", text: "Continue to SAK", disabled: !canContinue, onclick: async () => {
      await api("/api/setup/dismissed", { method: "PUT", body: JSON.stringify({ dismissed: true }) });
      await boot();
    } }),
    el("span", { class: canContinue ? "muted" : "error", text: canContinue
      ? "You can revisit any of this later in Settings."
      : "Set Movies' and Series' library root folders above to continue — SAK can't review anything without them." }),
  ]);
  container.appendChild(footer);
}

function buildWizardStep(n, title, optional, configured, service, existingConn, wizardContainer) {
  const fs = el("fieldset", {}, [
    el("legend", { text: n + ". " + title + (optional ? " (optional)" : "") + (configured ? " ✓" : "") }),
  ]);
  const c = buildConnectionControls(service, existingConn, () => renderWizard(wizardContainer));
  fs.appendChild(el("div", { class: "grid2" }, [
    el("label", {}, [document.createTextNode("URL"), c.urlInput]),
    el("label", {}, [document.createTextNode("API Key"), c.keyInput]),
  ]));
  fs.appendChild(el("div", { class: "row", style: "margin-top:0.5rem" }, [c.testBtn, c.saveBtn, c.status]));
  return fs;
}

// buildLibraryWizardStep is Movies'/Series' counterpart to buildWizardStep —
// neither has a *arr connection to test/save anymore (see internal/library's
// package doc), just a free-typed path SAK will scan/import into directly.
async function buildLibraryWizardStep(m, n, configured, wizardContainer) {
  let current = "";
  try { current = (await api("/api/modes/" + m + "/library/root-folder")).path; } catch (e) {}

  const fs = el("fieldset", {}, [
    el("legend", { text: n + ". " + MODE_LABELS[m] + " — library root folder" + (configured ? " ✓" : "") }),
  ]);
  const pathInput = el("input", { type: "text", value: current, placeholder: "/path/to/" + MODE_LABELS[m], style: "min-width:20rem" });
  const status = el("span", { class: "muted" });
  const saveBtn = el("button", { class: "primary", text: "Save", onclick: async () => {
    try {
      await api("/api/modes/" + m + "/library/root-folder", { method: "PUT", body: JSON.stringify({ path: pathInput.value }) });
      status.textContent = "✓ saved"; status.className = "muted";
      await renderWizard(wizardContainer);
    } catch (e) { status.textContent = "✗ " + e.message; status.className = "error"; }
  } });
  fs.appendChild(el("label", {}, [document.createTextNode("Root folder"), pathInput]));
  fs.appendChild(el("div", { class: "row", style: "margin-top:0.5rem" }, [saveBtn, status]));
  return fs;
}

// buildWizardAIStep lets the wizard connect AND select whichever AI
// provider right there (not a stub pointing at Settings) — same
// ai-provider/ai-model settings Settings itself reads/writes, so nothing
// done here needs redoing later.
async function buildWizardAIStep(n, byService, wizardContainer) {
  let provider = "ollama", model = "";
  try { provider = (await api("/api/settings/ai-provider")).provider; } catch (e) {}
  try { model = (await api("/api/settings/ai-model")).model; } catch (e) {}
  const configured = !!byService[provider];

  const fs = el("fieldset", {}, [
    el("legend", { text: n + ". AI provider (optional) — powers Adult identification, the Movies/Series title-guess fallback, and Kids classification" + (configured && model ? " ✓" : "") }),
  ]);

  const providerSelect = el("select", {});
  for (const p of AI_PROVIDERS) providerSelect.appendChild(el("option", { value: p, text: p, selected: p === provider ? "selected" : null }));
  const modelInput = el("input", { type: "text", value: model, placeholder: "e.g. qwen2.5vl:7b, gpt-4o-mini, gemini-2.5-flash, claude-haiku-4-5" });
  const modelStatus = el("span", { class: "muted" });
  const saveModelBtn = el("button", { text: "Save provider + model", onclick: async () => {
    try {
      await api("/api/settings/ai-provider", { method: "PUT", body: JSON.stringify({ provider: providerSelect.value }) });
      await api("/api/settings/ai-model", { method: "PUT", body: JSON.stringify({ model: modelInput.value }) });
      modelStatus.textContent = "✓ saved"; modelStatus.className = "muted";
    } catch (e) { modelStatus.textContent = "✗ " + e.message; modelStatus.className = "error"; }
  } });

  const connectionSlot = el("div");
  function renderConnectionFields() {
    connectionSlot.innerHTML = "";
    const service = providerSelect.value;
    const c = buildConnectionControls(service, byService[service], () => renderWizard(wizardContainer));
    connectionSlot.appendChild(el("div", { class: "grid2", style: "margin-top:0.5rem" }, [
      el("label", {}, [document.createTextNode("URL"), c.urlInput]),
      el("label", {}, [document.createTextNode("API Key"), c.keyInput]),
    ]));
    connectionSlot.appendChild(el("div", { class: "row", style: "margin-top:0.5rem" }, [c.testBtn, c.saveBtn, c.status]));
  }
  providerSelect.addEventListener("change", renderConnectionFields);

  fs.appendChild(el("div", { class: "grid2" }, [
    el("label", {}, [document.createTextNode("Provider"), providerSelect]),
    el("label", {}, [document.createTextNode("Model"), modelInput]),
  ]));
  fs.appendChild(el("div", { class: "row", style: "margin-top:0.5rem" }, [saveModelBtn, modelStatus]));
  fs.appendChild(connectionSlot);
  renderConnectionFields();
  return fs;
}

// ---- Proposal helpers ----

function statusPill(status) {
  return el("span", { class: "pill " + status, text: status });
}

async function applyProposal(id, body) {
  return api("/api/proposals/" + id + "/apply", { method: "POST", body: JSON.stringify(body || {}) });
}
async function dismissProposal(id) {
  return api("/api/proposals/" + id + "/dismiss", { method: "POST" });
}
async function submitDraft(id) {
  return api("/api/proposals/" + id + "/submit-draft", { method: "POST" });
}

// ---- Search view (Discover browse -> manual search -> grab -> Grabs status) ----
// The native replacement for Radarr/Sonarr's own acquisition loop: Discover
// browses TMDB's trending/popular titles (posters, click to search), the
// query bar searches Prowlarr directly, Grab sends a chosen release to
// qBittorrent/NZBGet, and Grabs tracks status through to import. Movies and
// Series only — this isn't wired for Adult (see MODE_WORKFLOWS).

function fmtFileSize(bytes) {
  if (!bytes) return "";
  const units = ["B", "KB", "MB", "GB", "TB"];
  let n = bytes, i = 0;
  while (n >= 1024 && i < units.length - 1) { n /= 1024; i++; }
  return n.toFixed(1) + " " + units[i];
}

function posterURL(path) {
  return path ? ("https://image.tmdb.org/t/p/w342" + path) : "";
}

// episodeSearchQuery builds a Series search term for a specific season (and
// optionally episode) — mirrors internal/api/search.go's own
// episodeSearchQuery exactly, so a manual search and a server-built one
// produce the same query shape.
function episodeSearchQuery(title, seasonNumber, episodeNumber) {
  const s = "S" + String(seasonNumber).padStart(2, "0");
  if (episodeNumber) return title + " " + s + "E" + String(episodeNumber).padStart(2, "0");
  return title + " " + s;
}

async function renderSearch(container) {
  const m = state.mode;
  container.innerHTML = "";
  container.appendChild(el("h2", { text: "Search" }));

  const queryInput = el("input", { type: "text", placeholder: "Search for a release...", style: "max-width:20rem" });
  const resultsSlot = el("div");

  async function runSearch(query, picked) {
    if (!query) return;
    queryInput.value = query;
    resultsSlot.innerHTML = "";
    resultsSlot.appendChild(el("div", { class: "muted", text: "Searching…" }));
    let results;
    try { results = await api("/api/modes/" + m + "/search?q=" + encodeURIComponent(query)); }
    catch (e) { resultsSlot.innerHTML = ""; resultsSlot.appendChild(fmtErr(e)); return; }
    renderResults(results, picked || {});
  }

  function renderResults(results, picked) {
    resultsSlot.innerHTML = "";
    if (!results.length) { resultsSlot.appendChild(el("div", { class: "empty", text: "No releases found." })); return; }
    const table = el("table", {}, [
      el("thead", {}, [el("tr", {}, ["Title", "Indexer", "Protocol", "Size", "Seeders", "Score", ""].map(h => el("th", { text: h })))]),
    ]);
    const tbody = el("tbody");
    for (const r of results) {
      const grabBtn = el("button", { class: "primary", text: "Grab", onclick: async () => {
        grabBtn.disabled = true;
        try {
          await grabRelease(r, picked);
          await renderGrabs(grabsSlot, m);
        } catch (e) { resultsSlot.appendChild(fmtErr(e)); }
        grabBtn.disabled = false;
      } });
      tbody.appendChild(el("tr", {}, [
        el("td", { text: r.title }),
        el("td", { text: r.indexer }),
        el("td", { text: r.protocol }),
        el("td", { text: fmtFileSize(r.size) }),
        el("td", { text: String(r.seeders || 0) }),
        el("td", { text: String(r.score) }),
        el("td", {}, [grabBtn]),
      ]));
    }
    table.appendChild(tbody);
    resultsSlot.appendChild(table);
  }

  async function grabRelease(release, picked) {
    let rootFolderPath = "";
    try {
      rootFolderPath = (await api("/api/modes/" + m + "/library/root-folder")).path;
    } catch (e) { /* fall through to the "no root folder" error below */ }
    if (!rootFolderPath) throw new Error("no root folder configured for " + m + " — add one in Settings first");

    await api("/api/modes/" + m + "/search/grab", { method: "POST", body: JSON.stringify({
      title: release.title, tmdbId: picked.tmdbId, tvdbId: picked.tvdbId,
      seasonNumber: picked.seasonNumber || undefined, episodeNumber: picked.episodeNumber || undefined,
      seasonSpecified: picked.seasonSpecified || false,
      indexer: release.indexer, protocol: release.protocol, downloadUrl: release.downloadUrl,
      rootFolderPath,
    }) });
  }

  // Series only: an optional season/episode picker — leave both blank for a
  // plain title search, set season alone for a season-pack search, or both
  // for one specific episode. Nothing forces using this over free text.
  const seasonInput = el("input", { type: "text", placeholder: "Season", style: "max-width:6rem" });
  const episodeInput = el("input", { type: "text", placeholder: "Episode", style: "max-width:6rem" });

  // Season "0" is a deliberate, valid choice (Specials) — checking the
  // input's raw text for blank, not the parsed number's truthiness, is
  // what lets "0" and "left blank" mean different things downstream.
  function pickedFromInputs() {
    if (m !== "series") return {};
    if (seasonInput.value.trim() === "") return {};
    const seasonNumber = parseInt(seasonInput.value, 10) || 0;
    const episodeNumber = parseInt(episodeInput.value, 10) || 0;
    return { seasonNumber, episodeNumber, seasonSpecified: true };
  }

  const searchRow = [queryInput];
  if (m === "series") searchRow.push(seasonInput, episodeInput);
  searchRow.push(el("button", { class: "primary", text: "Search releases", onclick: () => {
    const picked = pickedFromInputs();
    const query = picked.seasonSpecified ? episodeSearchQuery(queryInput.value, picked.seasonNumber, picked.episodeNumber) : queryInput.value;
    runSearch(query, picked);
  } }));
  container.appendChild(el("div", { class: "row" }, searchRow));
  container.appendChild(resultsSlot);

  container.appendChild(el("h3", { text: "Discover" }));
  const discoverSlot = el("div");
  container.appendChild(discoverSlot);
  await renderDiscover(discoverSlot, m, async (item) => {
    let tvdbId;
    if (item.mediaType === "tv") {
      try { tvdbId = (await api("/api/modes/" + m + "/discover/tvdb-id?tmdbId=" + item.id)).tvdbId; } catch (e) { /* grab still works without it via manual entry later */ }
    }
    await runSearch(item.title, { tmdbId: item.mediaType === "movie" ? item.id : undefined, tvdbId });
  });

  container.appendChild(el("h3", { text: "Grabs" }));
  const grabsSlot = el("div");
  container.appendChild(grabsSlot);
  await renderGrabs(grabsSlot, m);
}

// renderDiscover shows TMDB's trending titles as clickable poster cards.
// onPick receives the raw discover item (id/title/mediaType) so the caller
// can decide what to do — here, kick off a search prefilled with its title.
async function renderDiscover(container, m, onPick) {
  container.innerHTML = "";
  let items;
  try { items = await api("/api/modes/" + m + "/discover"); }
  catch (e) {
    container.appendChild(el("div", { class: "muted", text: "Connect tmdb in Settings to browse trending titles." }));

  const grid = el("div", { class: "poster-grid" });

// renderGrabs lists this mode's grabs with their current status and a
// Check & Import action — the one manual refresh step (see
// checkImportHandler's doc comment for why this isn't a background poller).
async function renderGrabs(container, m) {
  container.innerHTML = "";
  let list;
  try { list = await api("/api/modes/" + m + "/grabs"); }
  catch (e) { container.appendChild(fmtErr(e)); return; }
  if (!list.length) { container.appendChild(el("div", { class: "empty", text: "No grabs yet." })); return; }

  const table = el("table", {}, [
    el("thead", {}, [el("tr", {}, ["Title", "Indexer", "Download client", "Status", "Actions"].map(h => el("th", { text: h })))]),
  ]);
  const tbody = el("tbody");
  for (const g of list) {
    const actions = el("td");
    if (g.status !== "imported") {
      actions.appendChild(el("button", { text: "Check & Import", onclick: async () => {
        // Render AFTER catching, not before: renderGrabs(container, ...)
        // clears container's whole innerHTML, which would silently wipe an
        // error appended beforehand in the same tick — append it after the
        // refresh instead, so it's actually visible.
        let err = null;
        try { await api("/api/grabs/" + g.id + "/check-import", { method: "POST" }); } catch (e) { err = e; }
        await renderGrabs(container, m);
        if (err) container.appendChild(fmtErr(err));
      } }));
    }
    tbody.appendChild(el("tr", {}, [
      el("td", { text: g.title }),
      el("td", { text: g.indexer }),
      el("td", { text: g.downloadClient }),
      el("td", {}, [statusPill(g.status)]),
      actions,
    ]));
  }
  table.appendChild(tbody);
  container.appendChild(table);
}

function fmtBytes(bitRate) {
  if (!bitRate) return "";
  return Math.round(bitRate / 1000) + " kbps";
}

async function renderDedup(container) {
  const m = state.mode;
  container.innerHTML = "";
  container.appendChild(el("h2", { text: "Dedup" }));

  container.appendChild(el("div", { class: "row" }, [
    el("button", { class: "primary", text: "Scan", onclick: async () => { try { await api("/api/modes/" + m + "/dedup/scan", { method: "POST" }); } catch (e) { container.appendChild(fmtErr(e)); } await renderDedup(container); } }),
  ]));

  let proposals;
  try { proposals = await api("/api/modes/" + m + "/dedup/proposals"); }
  catch (e) { container.appendChild(fmtErr(e)); return; }
  if (!proposals.length) { container.appendChild(el("div", { class: "empty", text: "No duplicate groups yet — click Scan." })); return; }

  for (const p of proposals) {
    const card = el("div", { class: "card" });
    card.appendChild(el("div", { class: "row" }, [
      el("strong", { text: p.title || p.sourceName }),
      statusPill(p.status),
    ]));
    const table = el("table", {}, [
      el("thead", {}, [el("tr", {}, ["Keep", "Label", "Path", "Resolution", "Codec", "Bitrate"].map(h => el("th", { text: h })))]),
    ]);
    const tbody = el("tbody");
    const radioName = "keep-" + p.id;
    (p.candidates || []).forEach((c, i) => {
      const radio = el("input", { type: "radio", name: radioName, value: String(i) });
      if (c.winner) radio.checked = true;
      tbody.appendChild(el("tr", {}, [
        el("td", {}, [radio]),
        el("td", { text: c.label }),
        el("td", { text: c.path }),
        el("td", { text: c.resolution ? c.resolution + "p" : "" }),

      ]));
    });

    if (p.status === "pending") {
      const actions = el("div", { class: "row" });
      actions.appendChild(el("button", { class: "primary", text: "Apply", onclick: async () => {
        const checked = card.querySelector("input[name='" + radioName + "']:checked");

      actions.appendChild(el("button", { class: "danger", text: "Dismiss", onclick: async () => { try { await dismissProposal(p.id); } catch (e) { container.appendChild(fmtErr(e)); } await renderDedup(container); } }));
      card.appendChild(actions);
    }
    container.appendChild(card);
  }
}

// renderSonarrImport shows the one-time "Import from Sonarr" action —
// Series only, and only if a sonarr connection still exists to migrate
// from (see internal/sonarrimport's package doc). Safe to run more than
// once; the button doesn't hide itself after a successful run.
async function renderSonarrImport(container) {
  if (state.mode !== "series") return;
  let existing = [];
  try { existing = await api("/api/connections"); } catch (e) {}
  if (!existing.some((c) => c.service === "sonarr")) return;

  const fs = el("fieldset", {}, [el("legend", { text: "Import from Sonarr" })]);
  fs.appendChild(el("div", { class: "muted", text: "One-time import of every show Sonarr currently tracks into SAK's own library, including which episodes are still missing (from TMDB's season data). Read-only against Sonarr — makes no changes there." }));

  const resultSlot = el("div");
  const importBtn = el("button", { class: "primary", text: "Import from Sonarr", onclick: async () => {
    importBtn.disabled = true;
    resultSlot.innerHTML = "";
    resultSlot.appendChild(el("div", { class: "muted", text: "Importing…" }));
    try {
      const result = await api("/api/series/import-from-sonarr", { method: "POST" });
      resultSlot.innerHTML = "";
      const list = result.series || [];
      if (!list.length) { resultSlot.appendChild(el("div", { class: "empty", text: "Sonarr has nothing tracked to import." })); }
      else {
        const table = el("table", {}, [
          el("thead", {}, [el("tr", {}, ["Show", "Result", "Episodes found", "Episodes missing"].map((h) => el("th", { text: h })))]),
        ]);
        const tbody = el("tbody");
        for (const sr of list) {
          tbody.appendChild(el("tr", {}, [
            el("td", { text: sr.title }),
            el("td", { text: sr.imported ? "Imported" : ("Skipped: " + (sr.reason || "unknown reason")) }),
            el("td", { text: String(sr.episodesFound || 0) }),
            el("td", { text: String(sr.episodesMissing || 0) }),
          ]));
        }
        table.appendChild(tbody);
        resultSlot.appendChild(table);
      }
    } catch (e) { resultSlot.innerHTML = ""; resultSlot.appendChild(fmtErr(e)); }
    importBtn.disabled = false;
  } });

  fs.appendChild(el("div", { class: "row", style: "margin-top:0.5rem" }, [importBtn]));
  fs.appendChild(resultSlot);
  container.appendChild(fs);
}

// renderQualityPrefs backs Search's scoring for whichever mode actually has
// a Search workflow (Movies, Series — not Adult). Tier is a bitrate/codec
// preference (source + codec compression), completely independent of the
// max-resolution cap — see internal/quality's package doc for why these
// aren't the same setting.
async function renderQualityPrefs(container) {
  const m = state.mode;
  if (m === "adult") return;

  const fs = el("fieldset", {}, [el("legend", { text: "Search quality preferences (" + MODE_LABELS[m] + ")" })]);
  let tier = "high", maxResolution = 0;
  try {
    const prefs = await api("/api/modes/" + m + "/quality-prefs");
    tier = prefs.tier; maxResolution = prefs.maxResolution;
  } catch (e) {}

  const tierSelect = el("select", {});
  for (const t of QUALITY_TIERS) tierSelect.appendChild(el("option", { value: t, text: t, selected: t === tier ? "selected" : null }));
  const maxResSelect = el("select", {});
  for (const r of MAX_RESOLUTIONS) maxResSelect.appendChild(el("option", { value: String(r), text: r === 0 ? "no cap" : (r + "p"), selected: r === maxResolution ? "selected" : null }));
  const status = el("span", { class: "muted" });
  const saveBtn = el("button", { class: "primary", text: "Save", onclick: async () => {
    try {
      await api("/api/modes/" + m + "/quality-prefs", { method: "PUT", body: JSON.stringify({ tier: tierSelect.value, maxResolution: Number(maxResSelect.value) }) });
      status.textContent = "saved"; status.className = "muted";
    } catch (e) { status.textContent = "✗ " + e.message; status.className = "error"; }
  } });

  fs.appendChild(el("div", { class: "grid2" }, [
    el("label", {}, [document.createTextNode("Tier (bitrate/codec)"), el("div", {}, [tierSelect])]),
    el("label", {}, [document.createTextNode("Maximum resolution"), el("div", {}, [maxResSelect])]),
  ]));
  fs.appendChild(el("div", { class: "row", style: "margin-top:0.5rem" }, [saveBtn, status]));
  fs.appendChild(el("div", { class: "muted", text: "Tier prefers smaller/more-compressed releases (Low) up to the least-compressed remux/Blu-ray (Lossless) — it never changes what resolution is preferred. Maximum resolution softly prefers at-or-below-cap results, falling back to whatever's available if nothing meets it." }));
  container.appendChild(fs);
}

  const status = el("span", { class: "muted" });

      await api("/api/modes/" + m + "/naming-preset", { method: "PUT", body: JSON.stringify({ preset: presetSelect.value }) });
      status.textContent = "saved"; status.className = "muted";
    } catch (e) { status.textContent = "✗ " + e.message; status.className = "error"; }
  } });

  fs.appendChild(el("label", {}, [document.createTextNode("Naming convention"), el("div", {}, [presetSelect])]));
  fs.appendChild(el("div", { class: "row", style: "margin-top:0.5rem" }, [saveBtn, status]));
  fs.appendChild(el("div", { class: "muted", text: "Jellyfin/Emby standard renames into \"Title (Year) [tmdbid-N]\" folders/files. Legacy keeps this project's original convention, so an already-renamed library's shape never silently changes after an upgrade." }));
  container.appendChild(fs);
}

async function renderConnections(container) {
  const fs = el("fieldset", {}, [el("legend", { text: "Connections" })]);
  let existing = [];
  try { existing = await api("/api/connections"); } catch (e) { fs.appendChild(fmtErr(e)); }
  const byService = {};
  for (const c of existing) byService[c.service] = c;

  const table = el("table", {}, [
    el("thead", {}, [el("tr", {}, ["Service", "URL", "Username", "API Key / Password", "", ""].map(h => el("th", { text: h })))]),
  ]);
  const tbody = el("tbody");
  for (const service of CONNECTION_SERVICES) {
    const c = buildConnectionControls(service, byService[service], () => renderSettings(container));
    tbody.appendChild(el("tr", {}, [
      el("td", { text: service }),
      el("td", {}, [c.urlInput]),
      el("td", {}, c.needsUsername ? [c.usernameInput] : []),
      el("td", {}, [c.keyInput]),
      el("td", {}, [c.testBtn, c.saveBtn, c.deleteBtn]),
      el("td", {}, [c.status]),
    ]));
  }
  table.appendChild(tbody);
  fs.appendChild(table);
  container.appendChild(fs);
}

  const fs = el("fieldset", {}, [el("legend", { text: "AI (shared by Adult identification and the Movies/Series title-guess fallback)" })]);

      await api("/api/settings/ai-model", { method: "PUT", body: JSON.stringify({ model: modelInput.value }) });
      status.textContent = "saved"; status.className = "muted";
    } catch (e) { status.textContent = "✗ " + e.message; status.className = "error"; }

  const grid = el("div", { class: "grid2" }, [
    el("label", {}, [document.createTextNode("Provider"), el("div", {}, [providerSelect])]),

// renderKidsRootPath is Movies'/Series' Kids classification setting — a
// free-typed path for both now (neither has a *arr app to enumerate root
// folders from anymore, see internal/library's package doc).
async function renderKidsRootPath(container) {
  const modesWithKids = ["movies", "series"];

  const m = state.mode;

  const fs = el("fieldset", {}, [el("legend", { text: "Kids classification (" + MODE_LABELS[m] + ")" })]);

  const input = el("input", { type: "text", placeholder: "/path/to/" + MODE_LABELS[m] + " (Kids)", style: "min-width:20rem", value: current });
  const status = el("span", { class: "muted" });
  const saveBtn = el("button", { class: "primary", text: "Save", onclick: async () => {

      await api("/api/modes/" + m + "/rename/kids-root-path", { method: "PUT", body: JSON.stringify({ path: input.value }) });
      status.textContent = "saved"; status.className = "muted";

// ---- Login gate ----
// The very first thing boot() checks — before the connections Setup
// Wizard, before anything else. An instance with no login yet shows
// "Create your login"; one with a login but no valid session shows "Log
// in". Both hide the nav entirely, same as the wizard, so there's no path
// to a Scan button (or anything else) without getting through this first.

function renderCredentialsGate(container, kind) {
  container.innerHTML = "";
  const isSetup = kind === "setup";
  container.appendChild(el("h2", { text: isSetup ? "Create your SAK login" : "Log in to SAK" }));
  if (isSetup) {
    container.appendChild(el("p", { class: "muted", text: "This is the one login that protects this instance — anyone who can reach it can otherwise control every connected service. Pick a username and password now, before connecting anything." }));
  }

  const usernameInput = el("input", { type: "text", placeholder: "username", autocomplete: "username" });
  const passwordInput = el("input", { type: "password", placeholder: "password", autocomplete: isSetup ? "new-password" : "current-password" });
  const confirmInput = isSetup ? el("input", { type: "password", placeholder: "confirm password", autocomplete: "new-password" }) : null;
  const status = el("div", { class: "error" });

  const fields = [
    el("label", {}, [document.createTextNode("Username"), usernameInput]),
    el("label", {}, [document.createTextNode("Password"), passwordInput]),
  ];
  if (isSetup) fields.push(el("label", {}, [document.createTextNode("Confirm password"), confirmInput]));

  const submit = async () => {
    status.textContent = "";
    if (isSetup && passwordInput.value !== confirmInput.value) {
      status.textContent = "Passwords don't match.";
      return;
    }
    if (!usernameInput.value || !passwordInput.value) {
      status.textContent = "Username and password are both required.";
      return;
    }
    try {
      const res = await fetch(isSetup ? "/api/auth/setup" : "/api/auth/login", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: usernameInput.value, password: passwordInput.value }),
      });
      if (!res.ok) {
        const text = await res.text();
        status.textContent = res.status === 401 ? "Invalid username or password." : (text || ("HTTP " + res.status));
        return;
      }
      await boot();
    } catch (e) { status.textContent = e.message; }
  };

  const form = el("form", { onsubmit: (e) => { e.preventDefault(); submit(); } }, [
    ...fields,
    el("div", { class: "row", style: "margin-top:0.75rem" }, [
      el("button", { class: "primary", type: "submit", text: isSetup ? "Create login" : "Log in" }),
    ]),
    status,
  ]);
  form.style.maxWidth = "20rem";
  container.appendChild(form);
}

// ---- Router ----

const RENDERERS = { search: renderSearch, rename: renderRename, purge: renderPurge, dedup: renderDedup, tag: renderTag, settings: renderSettings };

async function render() {
  renderNav();
  const view = document.getElementById("view");
  view.innerHTML = "";
  const renderer = RENDERERS[state.view];
  if (renderer) await renderer(view);
}

function hideNav() {
  document.getElementById("mode-tabs").style.display = "none";
  document.getElementById("view-tabs").style.display = "none";
  document.getElementById("logout-slot").style.display = "none";
}
function showNav() {
  document.getElementById("mode-tabs").style.display = "";
  document.getElementById("view-tabs").style.display = "";
  document.getElementById("logout-slot").style.display = "";
}

// boot is the single entry point for "what should be on screen right now,"
// re-run after every login/setup/logout/wizard-dismiss transition. Order
// matters: the login gate comes before the connections Setup Wizard comes
// before the normal app — each one hides the nav entirely so there's no way
// to land on a bare Scan button before getting through the ones before it.
async function boot() {
  let authStatus = null;
  try { authStatus = await api("/api/auth/status"); } catch (e) { /* fall through */ }

  if (authStatus && !authStatus.configured) {
    hideNav();
    renderCredentialsGate(document.getElementById("view"), "setup");
    return;
  }
  if (authStatus && !authStatus.authenticated) {
    hideNav();
    renderCredentialsGate(document.getElementById("view"), "login");
    return;
  }

  let setupStatus = null;
  try { setupStatus = await api("/api/setup/status"); } catch (e) { /* fall through to the normal app if this fails */ }

  if (setupStatus && !setupStatus.dismissed) {
    hideNav();
    await renderWizard(document.getElementById("view"));
    return;
  }
  showNav();
  await render();
}

boot();
</script>
