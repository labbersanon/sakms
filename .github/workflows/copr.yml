name: COPR build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  copr:
    name: Submit SRPM to COPR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history required: version is derived from the total commit
          # count, which a shallow (default depth-1) clone can't compute.
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Determine version
        id: ver
        # A raw short SHA is NOT monotonically sortable under RPM's version
        # comparison (it splits into alternating digit/alpha segments, so
        # e.g. "54ca3c7" compares greater than "8f02b42" by pure coincidence
        # of hex digits, regardless of which commit is actually newer).
        # Prefix a strictly-increasing commit count so the leading numeric
        # segment always orders correctly; the short SHA stays for
        # human/debugging traceability only.
        run: echo "version=0.0.1~$(git rev-list --count HEAD).git$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Vendor Go modules
        # COPR builds run in a network-isolated mock chroot, so the module
        # cache must ship inside the source tarball rather than being
        # fetched at build time.
        run: go mod vendor

      - name: Build source archive
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          ARCHIVE="sakms-${VERSION}.tar.gz"
          PREFIX="sakms-${VERSION}"
          mkdir "$PREFIX"
          git archive HEAD | tar -x -C "$PREFIX"
          cp -r vendor "$PREFIX/vendor"
          tar czf "$ARCHIVE" "$PREFIX"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Install copr-cli + rpmbuild
        run: |
          sudo apt-get update -q
          sudo apt-get install -y rpm python3-pip
          pip3 install copr-cli

      - name: Write copr-cli config
        # COPR_RPM secret must be set in the repo: Settings → Secrets.
        # Format: the full ~/.config/copr content (token + login + copr_url).
        run: |
          mkdir -p ~/.config
          echo "${{ secrets.COPR_RPM }}" > ~/.config/copr

      - name: Generate spec with version substituted
        run: |
          sed "s/%{version}/$VERSION/g" packaging/rpm/sakms-node.spec > sakms-node.spec

      - name: Stage Source1 into _sourcedir
        # rpmbuild -bs below sets --define "_sourcedir $PWD", so every
        # Source<N> the spec references must exist in $PWD. Source0 (the
        # tarball) is already built there by "Build source archive"; Source1
        # (sakms-node.sysusers.conf) lives in packaging/rpm/ in the repo and
        # was never copied here — without this step rpmbuild fails with
        # "Bad file: .../sakms-node.sysusers.conf: No such file or directory".
        run: cp packaging/rpm/sakms-node.sysusers.conf .

      - name: Build SRPM
        run: |
          rpmbuild -bs \
            --define "_sourcedir $PWD" \
            --define "_srcrpmdir $PWD" \
            --define "version $VERSION" \
            sakms-node.spec

      - name: Submit to COPR
        run: |
          SRPM=$(ls sakms-node-*.src.rpm | head -1)
          copr-cli build labbersanon/SAK_Media_Server_Node "$SRPM"
